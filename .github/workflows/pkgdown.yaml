# Build the pkgdown site and deploy it to the gh-pages branch.
# Derived from https://github.com/r-lib/actions/tree/v2/examples (pkgdown),
# with Quarto set up because the vignette / articles are .qmd (mirrors
# this repo's R-CMD-check workflow).
on:
  push:
    branches: [main, master]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      # Pin Quarto so the .qmd vignette / articles render on the runner
      # (same as R-CMD-check.yaml; without it pkgdown's article build aborts).
      - uses: quarto-dev/quarto-actions/setup@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # local::. installs datasetviewer so `library(datasetviewer)` + the
          # live demo-data output resolve while pkgdown renders the .qmd
          # articles.
          extra-packages: any::pkgdown, local::.
          needs: website
          install-quarto: false

      - name: Hide non-site root markdown
        # pkgdown's package_mds() renders every root *.md as a public page
        # and ignores .Rbuildignore. CLAUDE.local.md is gitignored and absent
        # on CI, but CLAUDE.md is tracked, so drop it here. README and NEWS
        # are intentionally kept.
        run: rm -f CLAUDE.md

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      # With `development: mode: auto`, a dev version (X.Y.Z.9000) builds a
      # dev-only site under docs/dev/ -- a full-replace deploy of that would
      # wipe the release site at the gh-pages root (it did, 2026-07-22). So:
      # dev builds deploy docs/dev into dev/ (clean scoped to dev/), release
      # builds deploy docs/ to the root (clean, but preserving dev/).
      - name: Detect dev-only build
        if: github.event_name != 'pull_request'
        id: site
        run: |
          if [ -d docs/dev ] && [ ! -f docs/index.html ]; then
            echo "dev=true" >> "$GITHUB_OUTPUT"
          else
            echo "dev=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy dev site to gh-pages /dev 🚀
        if: github.event_name != 'pull_request' && steps.site.outputs.dev == 'true'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: true
          branch: gh-pages
          folder: docs/dev
          target-folder: dev

      - name: Deploy release site to gh-pages root 🚀
        if: github.event_name != 'pull_request' && steps.site.outputs.dev == 'false'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          # Full replace of the root: the site is regenerated in docs/ on
          # every build, so nothing at root should persist (clean: false left
          # renamed pages orphaned). dev/ is the one exception -- it is
          # written by the dev deploy above, never by a release build.
          clean: true
          clean-exclude: dev
          branch: gh-pages
          folder: docs
